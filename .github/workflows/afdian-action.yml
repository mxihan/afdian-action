name: afdian-action

on:
  schedule: # Run workflow automatically
    - cron: '0 * * * *' # Runs every hour, on the hour
  workflow_dispatch: # Run workflow manually (without waiting for the cron to be called), through the Github Actions Workflow page directly

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: main # 注意修改为你的分支, 例如: master
          submodules: recursive

      - name: Afdian action
        uses: mxihan/afdian-action@main
        with:
          # 在 Settings->Secrets 配置 AFDIAN_USERID, AFDIAN_TOKEN
          # 爱发电 user_id
          afdian_userId: ${{ secrets.AFDIAN_USERID }}
          # 爱发电 token
          afdian_token: ${{ secrets.AFDIAN_TOKEN }}
          # 默认为: .github/afdian-action.cshtml
          template_filePath: ".github/afdian-action-json.cshtml"
          # 默认为: README.md
          target_filePath: "Sponsors.json"
          # 可省, 高级选项: RazorEngine Complie, 在 cshtml 中需要 using 的 namespace, 多个用 ; 隔开
          usings: ""
          # 可省, 高级选项: RazorEngine Complie, 在 cshtml 中需要添加的 系统引用, 多个用 ; 隔开
          # 例如: assemblyReferences: "System.Collections, Version=6.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a"
          assemblyReferences: "Newtonsoft.Json, Version=13.0.0.0, Culture=neutral, PublicKeyToken=30ad4fe6b2a6aeed"

      - name: Commit and Push files
        run: |
          git config --local user.email "admin@sakuramoe.dev"
          git config --local user.name "mxihan"
          git add Sponsors.json
          
          # 检查是否有文件变更，避免因为 "nothing to commit" 导致 Action 失败
          if ! git diff-index --quiet HEAD; then
            git commit -m "Add changes: 爱发电赞助更新"
            git push origin main
          else
            echo "没有检测到赞助数据变更，跳过提交。"
          fi
